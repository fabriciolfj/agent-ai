# ==============================================================
# Quarkus + LangChain4j + Anthropic (Claude)
# ==============================================================

# --- API Key ---
# Em produção: use variável de ambiente QUARKUS_LANGCHAIN4J_ANTHROPIC_API_KEY
# ou Quarkus Secrets Manager integration
quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:sua-chave-aqui}

# --- Modelo ---
# claude-sonnet-4-20250514  ? equilíbrio custo/qualidade (recomendado)
# claude-opus-4-20250514    ? máxima capacidade
# claude-3-haiku-20240307   ? mais rápido/barato
quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-20250514

# --- Parâmetros do modelo ---
quarkus.langchain4j.anthropic.chat-model.temperature=0.7
quarkus.langchain4j.anthropic.chat-model.max-tokens=1024

# --- Timeout de conexão (ms) ---
quarkus.langchain4j.anthropic.timeout=30s

# --- Memória de chat (histórico por @MemoryId) ---
# Quantas mensagens manter no histórico por userId
quarkus.langchain4j.chat-memory.max-messages=20

# --- Logs de requisição/resposta (útil em dev) ---
quarkus.langchain4j.anthropic.log-requests=true
quarkus.langchain4j.anthropic.log-responses=true

# --- Servidor ---
quarkus.http.port=8080

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

%dev.quarkus.langchain4j.anthropic.log-requests=true
%dev.quarkus.langchain4j.anthropic.log-responses=true